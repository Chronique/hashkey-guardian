<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#0a0a0f" rx="32"/>

  <!-- Talawang shield shape (elongated Dayak shield) -->
  <!-- Outer shield -->
  <path d="M200 40
    C230 40 270 60 285 90
    L295 130
    L300 200
    L295 270
    L285 310
    C270 340 230 360 200 360
    C170 360 130 340 115 310
    L105 270
    L100 200
    L105 130
    L115 90
    C130 60 170 40 200 40Z"
    fill="none" stroke="#c8a84b" stroke-width="3"/>

  <!-- Inner shield layer -->
  <path d="M200 65
    C222 65 254 80 266 104
    L274 138
    L278 200
    L274 262
    L266 296
    C254 320 222 335 200 335
    C178 335 146 320 134 296
    L126 262
    L122 200
    L126 138
    L134 104
    C146 80 178 65 200 65Z"
    fill="#0f1420" stroke="#c8a84b" stroke-width="1.5" stroke-dasharray="6 3"/>

  <!-- Traditional Dayak motif: center diamond -->
  <polygon points="200,120 225,160 200,200 175,160"
    fill="none" stroke="#c8a84b" stroke-width="2"/>
  <polygon points="200,120 225,160 200,200 175,160"
    fill="#c8a84b" opacity="0.15"/>

  <!-- Dayak eye/face motif top -->
  <ellipse cx="200" cy="140" rx="12" ry="8" fill="#c8a84b" opacity="0.9"/>
  <ellipse cx="200" cy="140" rx="6" ry="4" fill="#0a0a0f"/>

  <!-- Side tribal lines left -->
  <line x1="130" y1="160" x2="172" y2="170" stroke="#c8a84b" stroke-width="1.5" opacity="0.7"/>
  <line x1="125" y1="180" x2="170" y2="185" stroke="#c8a84b" stroke-width="1.5" opacity="0.7"/>
  <line x1="125" y1="200" x2="170" y2="200" stroke="#c8a84b" stroke-width="1.5" opacity="0.7"/>
  <line x1="125" y1="220" x2="170" y2="215" stroke="#c8a84b" stroke-width="1.5" opacity="0.7"/>
  <line x1="130" y1="240" x2="172" y2="230" stroke="#c8a84b" stroke-width="1.5" opacity="0.7"/>

  <!-- Side tribal lines right -->
  <line x1="270" y1="160" x2="228" y2="170" stroke="#c8a84b" stroke-width="1.5" opacity="0.7"/>
  <line x1="275" y1="180" x2="230" y2="185" stroke="#c8a84b" stroke-width="1.5" opacity="0.7"/>
  <line x1="275" y1="200" x2="230" y2="200" stroke="#c8a84b" stroke-width="1.5" opacity="0.7"/>
  <line x1="275" y1="220" x2="230" y2="215" stroke="#c8a84b" stroke-width="1.5" opacity="0.7"/>
  <line x1="270" y1="240" x2="228" y2="230" stroke="#c8a84b" stroke-width="1.5" opacity="0.7"/>

  <!-- Center blockchain/AI motif — hexagon -->
  <polygon points="200,188 215,197 215,215 200,224 185,215 185,197"
    fill="none" stroke="#e53935" stroke-width="2"/>
  <!-- Hex nodes -->
  <circle cx="200" cy="188" r="3" fill="#e53935"/>
  <circle cx="215" cy="197" r="3" fill="#e53935"/>
  <circle cx="215" cy="215" r="3" fill="#e53935"/>
  <circle cx="200" cy="224" r="3" fill="#e53935"/>
  <circle cx="185" cy="215" r="3" fill="#e53935"/>
  <circle cx="185" cy="197" r="3" fill="#e53935"/>
  <!-- Center dot -->
  <circle cx="200" cy="206" r="5" fill="#e53935" opacity="0.9"/>

  <!-- Bottom tribal motif -->
  <path d="M175 255 Q200 245 225 255 Q215 275 200 280 Q185 275 175 255Z"
    fill="none" stroke="#c8a84b" stroke-width="1.5" opacity="0.8"/>
  <circle cx="200" cy="263" r="4" fill="#c8a84b" opacity="0.6"/>

  <!-- Top spear tip decoration -->
  <polygon points="200,42 207,58 200,55 193,58"
    fill="#c8a84b" opacity="0.8"/>
  <!-- Bottom spear tip -->
  <polygon points="200,358 207,342 200,345 193,342"
    fill="#c8a84b" opacity="0.8"/>

  <!-- Outer glow ring -->
  <path d="M200 40
    C230 40 270 60 285 90
    L295 130 L300 200 L295 270 L285 310
    C270 340 230 360 200 360
    C170 360 130 340 115 310
    L105 270 L100 200 L105 130 L115 90
    C130 60 170 40 200 40Z"
    fill="none" stroke="#e53935" stroke-width="1" opacity="0.3"/>
</svg>
